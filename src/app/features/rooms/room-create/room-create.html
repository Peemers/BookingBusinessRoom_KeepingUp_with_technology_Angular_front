<div class="min-h-screen flex items-center justify-center bg-gradient-to-bl from-gray-200 to-gray-500">
  <form [formGroup]="roomForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-1 max-w-xl min-w-xl mx-auto p-6">
    <div class="border rounded-lg shadow-2xl p-6 bg-white">
      <h1 class="underline text-2xl mb-6 ">Entrez les données de la salle :</h1>
      <div class="flex flex-col gap-1">
        <label for="name">Nom de la salle</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          class="border rounded px-3 py-2"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="location">Localisation de la salle (ex: 1er étage, aile C)</label>
        <input
          id="location"
          type="text"
          formControlName="location"
          class="border rounded px-3 py-2"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="maxCapacity">Capacité maximale</label>
        <input
          id="maxCapacity"
          type="number"
          formControlName="maxCapacity"
          class="border rounded px-3 py-2"
        />
      </div>
      <button
        type="submit"
        [disabled]="roomForm.invalid"
        class=" mt-7 bg-gradient-to-br from-blue-300 via-blue-500  to-black  text-white rounded px-4 py-2 disabled:opacity-50 hover:from-pink-500 hover:via-pink-700 hover:to-orange-500"
      >
        Créer la salle
      </button>
    </div>
  </form>
</div>
