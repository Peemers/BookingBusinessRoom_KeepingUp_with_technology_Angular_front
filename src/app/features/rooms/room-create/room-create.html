<form [formGroup]="roomForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 max-w-md mx-auto p-6">
  <div class="flex flex-col gap-1">
    <label for="location">Nom de la salle</label>
    <input
      id="location"
      type="text"
      formControlName="location"
      class="border rounded px-3 py-2"
    />
  </div>
  <div class="flex flex-col gap-1">
    <label for="maxCapacity">Capacité maximale</label>
    <input
      id="maxCapacity"
      type="number"
      formControlName="maxCapacity"
      class="border rounded px-3 py-2"
    />
  </div>
  <button
    type="submit"
    [disabled]="roomForm.invalid"
    class="bg-blue-600 text-white rounded px-4 py-2 disabled:opacity-50"
  >
    Créer la salle
  </button>
</form>
